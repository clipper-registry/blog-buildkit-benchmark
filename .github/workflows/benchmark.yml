name: benchmark

# Builds the clipper buildkit fork (moby/buildkit:local), sets up the upstream
# and clipper-aware builders, runs the benchmark scenarios, and reports the timings.
#
# Each scenario runs on its OWN runner (matrix) so they all run in parallel and
# fully cold -- they share no builder, and each writes distinct cache/destination
# tags (cuda-llamacpp-bench:<scenario>, cuda-llamacpp-bench-cache:<scenario>-<arch>), so parallel runs don't
# collide. A final `summarize` job collects every scenario's result into one
# table. Running the scripts locally (`./setup.sh && ./bench.sh`) still does the
# whole suite sequentially on one machine.
#
# The clipper buildkit image is pulled from ghcr.io using the built-in
# GITHUB_TOKEN (packages: read) -- no extra secret needed. The ghcr package must
# grant this repo read access (org-internal/public, or add it explicitly).
#
# Required repository or org secrets (usernames are hardcoded, not secret):
#   CLIPPER_CI_CREDENTIALS     clipper.dev push token; login is `-u token` (clipper-* scenarios).
#   DOCKERHUB_TOKEN            docker.io push token; login is `-u clipperkyle` (upstream-* scenarios).
#
# Known limitations on GitHub-hosted runners (see README "CI" section):
#   - Timings are noisy (shared VMs); use for trend/regression, not absolutes.
#   - The clipper.dev/clipper/cuda base must have a linux/amd64 variant, or
#     the clipper-* scenarios fail to pull on the amd64 runner.
#   - clipper-lazy-fuse (lazy FUSE snapshotter) needs /dev/fuse in the
#     docker-container builder and may not work; the scenario job continues so
#     the others still report.

on:
  push:
    branches: ['**']
  workflow_dispatch:
    inputs:
      buildkit_image:
        description: clipper buildkit image (ghcr, including tag) to benchmark
        default: ghcr.io/clipper-registry/buildkit:latest
        type: string
      scenarios:
        description: space-separated scenarios to run (e.g. "clipper-registry-cache clipper-cache-mount clipper-lazy-fuse" to skip the upstream baselines)
        default: upstream-baseline upstream-cachedance clipper-registry-cache clipper-cache-mount clipper-lazy-fuse
        type: string

permissions:
  contents: read
  packages: read
  actions: read   # summarize reads the upstream-cachedance job's step timings (cache-dance overhead)

# Scenarios push fixed bench tags to the real registries; cancel a superseded
# run for this ref rather than let two overlap.
concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prep:
    # Expand the (optional) space-separated `scenarios` allowlist into a JSON
    # array for the matrix below. Defaults to all four (e.g. on push). The
    # matrix context isn't available in a job-level `if`, so filtering is done
    # here instead.
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        env:
          SCENARIOS: ${{ inputs.scenarios || 'upstream-baseline upstream-cachedance clipper-registry-cache clipper-cache-mount clipper-lazy-fuse' }}
        run: |
          arr=""
          for s in $SCENARIOS; do
            arr="$arr\"$s\","
          done
          echo "matrix=[${arr%,}]" >> "$GITHUB_OUTPUT"

  scenario:
    needs: prep
    name: ${{ matrix.scenario }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJSON(needs.prep.outputs.matrix) }}
    steps:
      - name: Checkout benchmarks
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to clipper.dev
        uses: docker/login-action@v4
        with:
          registry: clipper.dev
          username: token
          password: ${{ secrets.CLIPPER_CI_CREDENTIALS }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: clipperkyle
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Only the clipper-* scenarios run on the clipper buildkit image; the
      # upstream-* scenarios use moby/buildkit (set in setup.sh), so they don't
      # need this pull.
      - name: Pull clipper buildkit image
        if: contains(matrix.scenario, 'clipper')
        env:
          BUILDKIT_IMAGE: ${{ inputs.buildkit_image || 'ghcr.io/clipper-registry/buildkit:latest' }}
        run: |
          docker pull "$BUILDKIT_IMAGE"
          # setup.sh expects the clipper builder image as moby/buildkit:local
          docker tag "$BUILDKIT_IMAGE" moby/buildkit:local

      - name: Set up builder
        run: ./setup.sh ${{ matrix.scenario }}

      # upstream-cachedance is the upstream-with-cache-dance scenario: upstream
      # buildkit can't restore a RUN cache mount from a registry the way clipper's
      # cache-mount does, so the realistic upstream alternative is
      # buildkit-cache-dance + actions/cache. This warms its cache mounts so we
      # compare clipper's native cache-mount (clipper-cache-mount/clipper-lazy-fuse)
      # against upstream's best option (upstream-cachedance) and against a cold
      # upstream build (upstream-baseline). Only upstream-cachedance does the dance;
      # its restore/save time is added back in the summary.
      - name: Restore upstream-cachedance cache mounts (cache-dance)
        if: matrix.scenario == 'upstream-cachedance'
        uses: actions/cache@v5
        id: s1dancecache
        with:
          path: upstream-cachedance-cache-mounts
          key: upstream-cachedance-cache-mounts-${{ hashFiles('Dockerfile') }}
      - name: Inject upstream-cachedance cache mounts into builder (cache-dance)
        if: matrix.scenario == 'upstream-cachedance'
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          builder: bench-upstream-cachedance
          cache-dir: upstream-cachedance-cache-mounts
          dockerfile: Dockerfile
          skip-extraction: ${{ steps.s1dancecache.outputs.cache-hit }}

      - name: Run scenario
        env:
          SCENARIOS: ${{ matrix.scenario }}
        run: ./bench.sh

      - name: Capture buildkitd daemon log
        if: always()
        run: |
          # The clipper PHASE markers (solve/exec boundaries) are bklog-timestamped
          # in the daemon log; capture this scenario's builder so the run can be
          # split into pre-exec / compile / export.
          docker logs "buildx_buildkit_bench-${{ matrix.scenario }}0" > "bench-${{ matrix.scenario }}-daemon.log" 2>&1 || true

      - name: Lazy FUSE pull stats
        if: ${{ always() && matrix.scenario == 'clipper-lazy-fuse' }}
        run: |
          # bench-clipper-lazy-fuse only runs that scenario, so its clipper content
          # store after the run == exactly the bytes the lazy FUSE path fetched on
          # demand. If FUSE were broken (eager fallback) this would balloon to the
          # whole decompressed image; lazy pulls only the working set.
          c=buildx_buildkit_bench-clipper-lazy-fuse0
          store=/var/lib/buildkit/runc-clipper-lazy/snapshots/clipper/content
          : > fuse-stats.txt
          echo "bytes fetched on demand:" >> fuse-stats.txt
          docker exec "$c" du -sh "$store" >> fuse-stats.txt 2>/dev/null || echo "(no clipper content store)" >> fuse-stats.txt
          echo "chunks fetched (blob inode count):" >> fuse-stats.txt
          docker exec "$c" du -s --inodes "$store/blobs" >> fuse-stats.txt 2>/dev/null || true
          cat fuse-stats.txt

      - name: Upload scenario artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: results-${{ matrix.scenario }}
          path: |
            results.txt
            *-build.log
            *-daemon.log
            fuse-stats.txt
          if-no-files-found: ignore

  summarize:
    needs: scenario
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Download scenario artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Summarize results
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # upstream-cachedance restores/saves its RUN cache mount in out-of-band
          # workflow steps (actions/cache + buildkit-cache-dance), outside the timed
          # build, whereas clipper does it inside the build. Measure that time so it
          # can be folded into the phase split: the restore+inject (import) runs
          # before the build (-> pull), the Post extract+save (export) runs after
          # (-> export). Split by whether the step name starts with "Post ".
          jobs_api="repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs"
          dance_import=$(gh api "$jobs_api" --paginate \
            --jq '[.jobs[] | select(.name=="upstream-cachedance") | .steps[]
                   | select((.name | test("cache-dance")) and (.name | startswith("Post ") | not) and .started_at != null and .completed_at != null)
                   | ((.completed_at | fromdateiso8601) - (.started_at | fromdateiso8601))] | add // 0' \
            2>/dev/null || echo 0)
          dance_export=$(gh api "$jobs_api" --paginate \
            --jq '[.jobs[] | select(.name=="upstream-cachedance") | .steps[]
                   | select((.name | test("cache-dance")) and (.name | startswith("Post ")) and .started_at != null and .completed_at != null)
                   | ((.completed_at | fromdateiso8601) - (.started_at | fromdateiso8601))] | add // 0' \
            2>/dev/null || echo 0)
          case "$dance_import" in (*[!0-9]*|"") dance_import=0 ;; esac
          case "$dance_export" in (*[!0-9]*|"") dance_export=0 ;; esac
          {
            echo "## Benchmark results"
            echo "Phases partition the real total (parsed from each scenario's buildx log): pull ends when the last base-image fetch completes (resolve + cache-manifest import + layer download/extract), export is the image + registry-cache push, and build is the remainder (stage RUN steps; for the lazy snapshotter this includes the on-demand fetches during exec)."
            echo
            echo "upstream-cachedance restores/saves its RUN cache mount with buildkit-cache-dance in steps outside the timed build; that import (${dance_import}s) is folded into its pull and that export (${dance_export}s) into its export, so it is comparable to clipper's in-build cache."
            echo
            echo '| scenario | exit | pull (s) | build (s) | export (s) | total (s) |'
            echo '| --- | --- | --- | --- | --- | --- |'
            awk -v di="$dance_import" -v de="$dance_export" '
              /^RESULT label=/ {
                l=$0; sub(/.*label=/,"",l); sub(/ .*/,"",l); gsub(/"/,"",l)
                e=$0; sub(/.*exit=/,"",e); sub(/ .*/,"",e)
                s=$0; sub(/.*seconds=/,"",s); sub(/ .*/,"",s)
                ec[l]=e; tot[l]=s; seen[l]=1
              }
              /^PHASE label=/ {
                l=$0; sub(/.*label=/,"",l); sub(/ .*/,"",l); gsub(/"/,"",l)
                p=$0; sub(/.*pull=/,"",p); sub(/ .*/,"",p)
                b=$0; sub(/.*build=/,"",b); sub(/ .*/,"",b)
                x=$0; sub(/.*export=/,"",x); sub(/ .*/,"",x)
                pl[l]=p; bd[l]=b; ex[l]=x; seen[l]=1
              }
              END {
                n=0; for (l in seen) lab[n++]=l
                for (i=0;i<n;i++) for (j=i+1;j<n;j++) if (lab[j]<lab[i]) { t=lab[i];lab[i]=lab[j];lab[j]=t }
                for (i=0;i<n;i++) { l=lab[i]
                  if (l in pl) {
                    p=pl[l]; b=bd[l]; x=ex[l]; tt=tot[l]+0
                    if (l=="upstream-cachedance") { p+=di; x+=de; tt+=di+de }
                    printf "| %s | %s | %.1f | %.1f | %.1f | %d |\n", l, ec[l], p, b, x, tt
                  } else {
                    printf "| %s | %s | - | - | - | %s |\n", l, ec[l], tot[l]
                  }
                }
                if (n==0) print "| (no results) | | | | | |"
              }
            ' artifacts/*/results.txt 2>/dev/null || echo '| (no results) | | | | | |'
            if [ -f artifacts/results-clipper-lazy-fuse/fuse-stats.txt ]; then
              echo
              echo "## Lazy FUSE pull stats (clipper-lazy-fuse)"
              echo '```'
              cat artifacts/results-clipper-lazy-fuse/fuse-stats.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: artifacts/**
          if-no-files-found: ignore
