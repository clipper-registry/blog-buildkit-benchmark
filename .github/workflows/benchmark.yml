name: benchmark

# Builds the clipper buildkit fork (moby/buildkit:local), sets up the builders,
# and runs every workload x scenario "cell" (e.g. llamacpp-clipper-lazy-fuse,
# uv-upstream-baseline), reporting the timings.
#
# Each cell runs on its OWN runner (matrix) so they all run in parallel and fully
# cold -- they share no builder, and each writes distinct cache/destination tags
# (cuda-bench:<cell>, cuda-bench-cache:<cell>-<arch>), so parallel runs don't
# collide. A final `summarize` job collects every cell's result into one table.
# Running the scripts locally (`./setup.sh && ./bench.sh`) does the whole suite
# sequentially on one machine.
#
# The clipper buildkit image is pulled from ghcr.io using the built-in
# GITHUB_TOKEN (packages: read) -- no extra secret needed. The ghcr package must
# grant this repo read access (org-internal/public, or add it explicitly).
#
# Required repository or org secrets (usernames are hardcoded, not secret):
#   CLIPPER_CI_CREDENTIALS     clipper.dev push token; login is `-u token` (clipper-* scenarios).
#   DOCKERHUB_TOKEN            docker.io push token; login is `-u clipperkyle` (upstream-* scenarios).
#
# Known limitations on GitHub-hosted runners (see README "CI" section):
#   - Timings are noisy (shared VMs); use for trend/regression, not absolutes.
#   - The clipper.dev/clipper/cuda base must have a linux/amd64 variant, or
#     the clipper-* scenarios fail to pull on the amd64 runner.
#   - clipper-lazy-fuse (lazy FUSE snapshotter) needs /dev/fuse in the
#     docker-container builder and may not work; the scenario job continues so
#     the others still report.

on:
  push:
    branches: ['**']
  workflow_dispatch:
    inputs:
      buildkit_image:
        description: clipper buildkit image (ghcr, including tag) to benchmark
        default: ghcr.io/clipper-registry/buildkit:latest
        type: string
      workloads:
        description: space-separated workloads to run
        default: llamacpp uv
        type: string
      scenarios:
        description: space-separated scenarios to run (e.g. "clipper-baseline clipper-cache-mount clipper-lazy-fuse" to skip the upstream baselines)
        default: upstream-baseline upstream-cachedance clipper-baseline clipper-cache-mount clipper-lazy-fuse
        type: string

permissions:
  contents: read
  packages: read
  actions: read   # summarize reads the upstream-cachedance job's step timings (cache-dance overhead)

# Scenarios push fixed bench tags to the real registries; cancel a superseded
# run for this ref rather than let two overlap.
concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prep:
    # Cross-product workloads x scenarios into a JSON array of "<wl>-<scenario>"
    # cells for the matrix below.
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        env:
          WORKLOADS: ${{ inputs.workloads || 'llamacpp uv' }}
          SCENARIOS: ${{ inputs.scenarios || 'upstream-baseline upstream-cachedance clipper-baseline clipper-cache-mount clipper-lazy-fuse' }}
        run: |
          arr=""
          for w in $WORKLOADS; do for s in $SCENARIOS; do
            arr="$arr\"$w-$s\","
          done; done
          echo "matrix=[${arr%,}]" >> "$GITHUB_OUTPUT"

  scenario:
    needs: prep
    name: ${{ matrix.cell }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        cell: ${{ fromJSON(needs.prep.outputs.matrix) }}
    steps:
      - name: Checkout benchmarks
        uses: actions/checkout@v7

      # GitHub rotates jobs across different host CPUs, which is the main source
      # of timing noise. Record the actual hardware so runs can be bucketed (or
      # outliers discarded) by CPU model.
      - name: Runner hardware
        run: |
          {
            echo "## Runner hardware (${{ matrix.cell }})"
            echo '```'
            lscpu | grep -E 'Model name|^CPU\(s\)|Thread|Core|Socket'
            echo
            free -h
            echo
            df -h /
            echo
            echo "runner: $RUNNER_NAME ($RUNNER_OS/$RUNNER_ARCH)"
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to clipper.dev
        uses: docker/login-action@v4
        with:
          registry: clipper.dev
          username: token
          password: ${{ secrets.CLIPPER_CI_CREDENTIALS }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: clipperkyle
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Only the clipper-* scenarios run on the clipper buildkit image; the
      # upstream-* scenarios use moby/buildkit (set in setup.sh), so they don't
      # need this pull.
      - name: Pull clipper buildkit image
        if: contains(matrix.cell, 'clipper')
        env:
          BUILDKIT_IMAGE: ${{ inputs.buildkit_image || 'ghcr.io/clipper-registry/buildkit:latest' }}
        run: |
          docker pull "$BUILDKIT_IMAGE"
          # setup.sh expects the clipper builder image as moby/buildkit:local
          docker tag "$BUILDKIT_IMAGE" moby/buildkit:local

      - name: Set up builder
        run: ./setup.sh ${{ matrix.cell }}

      # upstream-cachedance is the upstream-with-cache-dance scenario: upstream
      # buildkit can't restore a RUN cache mount from a registry the way clipper's
      # cache-mount does, so the realistic upstream alternative is
      # buildkit-cache-dance + actions/cache. This warms its cache mounts so we
      # compare clipper's native cache-mount (clipper-cache-mount/clipper-lazy-fuse)
      # against upstream's best option (upstream-cachedance) and against a cold
      # upstream build (upstream-baseline). Only upstream-cachedance does the dance;
      # its restore/save time is added back in the summary.
      - name: Restore cache mounts (cache-dance)
        if: contains(matrix.cell, 'upstream-cachedance')
        uses: actions/cache@v5
        id: s1dancecache
        with:
          path: ${{ matrix.cell }}-cache-mounts
          # Per-run key (restore-keys for fallback) so save + extraction run every
          # build. A static key hits and skips both, reading export as 0s.
          key: ${{ matrix.cell }}-cache-mounts-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ matrix.cell }}-cache-mounts-
      - name: Inject cache mounts into builder (cache-dance)
        if: contains(matrix.cell, 'upstream-cachedance')
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          builder: bench-${{ matrix.cell }}
          cache-dir: ${{ matrix.cell }}-cache-mounts
          dockerfile: ${{ startsWith(matrix.cell, 'uv-') && 'uv/Dockerfile' || 'llamacpp/Dockerfile' }}

      - name: Run scenario
        env:
          CELLS: ${{ matrix.cell }}
        run: ./bench.sh

      - name: Capture buildkitd daemon log
        if: always()
        run: |
          # The clipper PHASE markers (solve/exec boundaries) are bklog-timestamped
          # in the daemon log; capture this scenario's builder so the run can be
          # split into pre-exec / compile / export.
          docker logs "buildx_buildkit_bench-${{ matrix.cell }}0" > "bench-${{ matrix.cell }}-daemon.log" 2>&1 || true

      - name: Lazy FUSE pull stats
        if: ${{ always() && contains(matrix.cell, 'clipper-lazy-fuse') }}
        run: |
          # This cell only ran clipper-lazy-fuse, so its clipper content store ==
          # exactly the bytes the lazy FUSE path fetched on demand. If FUSE were
          # broken (eager fallback) this would balloon to the whole decompressed
          # image; lazy pulls only the working set.
          c=buildx_buildkit_bench-${{ matrix.cell }}0
          store=/var/lib/buildkit/runc-clipper-lazy/snapshots/clipper/content
          : > fuse-stats.txt
          echo "bytes fetched on demand:" >> fuse-stats.txt
          docker exec "$c" du -sh "$store" >> fuse-stats.txt 2>/dev/null || echo "(no clipper content store)" >> fuse-stats.txt
          echo "chunks fetched (blob inode count):" >> fuse-stats.txt
          docker exec "$c" du -s --inodes "$store/blobs" >> fuse-stats.txt 2>/dev/null || true
          cat fuse-stats.txt

      - name: Upload scenario artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: results-${{ matrix.cell }}
          path: |
            results.txt
            *-build.log
            *-daemon.log
            fuse-stats.txt
          if-no-files-found: ignore

  summarize:
    needs: scenario
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Download scenario artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Summarize results
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Per-workload cache-dance overhead: for each "<wl>-upstream-cachedance"
          # job, sum its restore+inject (import, pre-build) and Post extract+save
          # (export, post-build) steps. Passed to awk as "wl:import:export ...".
          jobs_api="repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs"
          dance=""
          for job in $(gh api "$jobs_api" --paginate --jq '.jobs[].name | select(endswith("upstream-cachedance"))'); do
            wl="${job%-upstream-cachedance}"
            imp=$(gh api "$jobs_api" --paginate --jq "[.jobs[]|select(.name==\"$job\")|.steps[]|select((.name|test(\"cache-dance\")) and (.name|startswith(\"Post \")|not) and .started_at!=null and .completed_at!=null)|((.completed_at|fromdateiso8601)-(.started_at|fromdateiso8601))]|add // 0")
            exp=$(gh api "$jobs_api" --paginate --jq "[.jobs[]|select(.name==\"$job\")|.steps[]|select((.name|test(\"cache-dance\")) and (.name|startswith(\"Post \")) and .started_at!=null and .completed_at!=null)|((.completed_at|fromdateiso8601)-(.started_at|fromdateiso8601))]|add // 0")
            case "$imp" in (*[!0-9]*|"") imp=0 ;; esac
            case "$exp" in (*[!0-9]*|"") exp=0 ;; esac
            dance="$dance ${wl}:${imp}:${exp}"
          done
          {
            echo "## Benchmark results"
            echo "Phases partition each cell's real total (from its buildx log): pull = base resolve + cache-manifest import + layer download/extract; export = image + registry-cache push; build = the remainder (stage RUN steps; for lazy-fuse, on-demand fetches during exec). upstream-cachedance's out-of-band buildkit-cache-dance time is shown in the dance columns and added to its total."
            echo
            echo '| workload | scenario | exit | dance import (s) | pull (s) | build (s) | export (s) | dance export (s) | total (s) |'
            echo '| --- | --- | --- | --- | --- | --- | --- | --- | --- |'
            awk -v dance="$dance" '
              BEGIN {
                m=split(dance, parts, " ")
                for (k=1;k<=m;k++) { if (parts[k]=="") continue; split(parts[k], kv, ":"); di[kv[1]]=kv[2]+0; de[kv[1]]=kv[3]+0 }
              }
              /^RESULT label=/ {
                l=$0; sub(/.*label=/,"",l); sub(/ .*/,"",l); gsub(/"/,"",l)
                e=$0; sub(/.*exit=/,"",e); sub(/ .*/,"",e)
                s=$0; sub(/.*seconds=/,"",s); sub(/ .*/,"",s)
                ec[l]=e; tot[l]=s; seen[l]=1
              }
              /^PHASE label=/ {
                l=$0; sub(/.*label=/,"",l); sub(/ .*/,"",l); gsub(/"/,"",l)
                p=$0; sub(/.*pull=/,"",p); sub(/ .*/,"",p)
                b=$0; sub(/.*build=/,"",b); sub(/ .*/,"",b)
                x=$0; sub(/.*export=/,"",x); sub(/ .*/,"",x)
                pl[l]=p; bd[l]=b; ex[l]=x; seen[l]=1
              }
              END {
                n=0; for (l in seen) lab[n++]=l
                for (i=0;i<n;i++) { l=lab[i]
                  wl[l]=substr(l,1,index(l,"-")-1); sc[l]=substr(l,index(l,"-")+1)
                  eff[l]=tot[l]+0
                  if (sc[l]=="upstream-cachedance") eff[l]+=di[wl[l]]+de[wl[l]]
                  bkt[l]=(sc[l] ~ /^upstream/)?0:((sc[l] ~ /^clipper/)?1:2)
                }
                # Sort: workload asc, upstream-before-clipper, then total desc.
                for (i=0;i<n;i++) for (j=i+1;j<n;j++) { p1=lab[i]; p2=lab[j]
                  if (wl[p2]<wl[p1] || (wl[p2]==wl[p1] && bkt[p2]<bkt[p1]) || (wl[p2]==wl[p1] && bkt[p2]==bkt[p1] && eff[p2]>eff[p1])) { lab[i]=p2; lab[j]=p1 }
                }
                for (i=0;i<n;i++) { l=lab[i]
                  if (l in pl) {
                    if (sc[l]=="upstream-cachedance") { dis=sprintf("%d", di[wl[l]]); des=sprintf("%d", de[wl[l]]) } else { dis="-"; des="-" }
                    printf "| %s | %s | %s | %s | %.1f | %.1f | %.1f | %s | %d |\n", wl[l], sc[l], ec[l], dis, pl[l], bd[l], ex[l], des, eff[l]
                  } else {
                    printf "| %s | %s | %s | - | - | - | - | - | %s |\n", wl[l], sc[l], ec[l], tot[l]
                  }
                }
                if (n==0) print "| (no results) | | | | | | | | |"
              }
            ' artifacts/*/results.txt 2>/dev/null || echo '| (no results) | | | | | | | | |'
            for f in artifacts/results-*-clipper-lazy-fuse/fuse-stats.txt; do
              [ -f "$f" ] || continue
              cell="${f#artifacts/results-}"; cell="${cell%/fuse-stats.txt}"
              echo
              echo "## Lazy FUSE pull stats ($cell)"
              echo '```'
              cat "$f"
              echo '```'
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: artifacts/**
          if-no-files-found: ignore
